<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Life Timer - Count your remaining time">
  <meta name="theme-color" content="#1a1d29">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Life Timer">
  
  <title>Life Timer ⏳</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container">
    <div id="setupScreen" class="setup hidden">
      <h1>⏳ Life Timer Setup</h1>
      <p>Set your birthdate once. Saved permanently on this device.</p>
      
      <div class="form-group">
        <label for="birthdate">Your birthdate</label>
        <input type="date" id="birthdate" max="">
      </div>
      
      <div class="form-group">
        <label for="country">Life expectancy</label>
        <select id="country">
          <option value="73.4">Global Average (~73.4 years)</option>
          <option value="70.8">India (~70.8 years)</option>
          <option value="78.9">USA (~78.9 years)</option>
          <option value="84.0">Japan (~84.0 years)</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="timezone">Timezone for day counter</label>
        <select id="timezone">
          <option value="5.5">Indian Standard Time (IST)</option>
          <option value="0">Universal Time (UTC+0)</option>
          <option value="-5">US Eastern Time (EST)</option>
        </select>
      </div>
      
      <div class="form-group hidden" id="customExpectancy">
        <label for="customYears">Custom Years</label>
        <input type="number" id="customYears" min="50" max="100" step="0.1" value="73.4">
      </div>
      
      <button onclick="saveSettings()">🕐 Start Clock</button>
    </div>
    
    <div id="timerScreen" class="screen timer hidden">
      <div class="clock-display">
        <div class="clock-time" id="clockTime">00:000:00:00:00</div>
        <div class="clock-label">YEARS : DAYS : HOURS : MIN : SEC</div>
        <div class="timer-title">⏳ Time Remaining</div>
      </div>
      
      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">Life Lived: 0.00%</div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="currentAge">0</div>
          <div class="stat-label">Current Age</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="daysLeft">0</div>
          <div class="stat-label">Days Left</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="hoursLeft">0</div>
          <div class="stat-label">Hours Left</div>
        </div>
      </div>
    </div>

    <div id="tasksScreen" class="screen tasks hidden">
      <div class="header-container">
        <h2>Daily Execution</h2>
        <p class="subtitle">Select exactly 3 critical tasks for today.</p>
      </div>

      <div class="task-input-container">
        <input type="text" id="newTaskInput" placeholder="Enter a high-impact task...">
        <button onclick="addTask()" class="add-task-btn">+</button>
      </div>

      <ul id="taskList" class="task-list">
        </ul>
    </div>
    
  </div>

  <nav class="bottom-nav hidden" id="mainNav">
    <button class="nav-item active" onclick="switchTab('timerScreen', this)">
      <span class="nav-icon">⏳</span>
      <span class="nav-text">Overview</span>
    </button>
    <button class="nav-item" onclick="switchTab('tasksScreen', this)">
      <span class="nav-icon">🎯</span>
      <span class="nav-text">Tasks</span>
    </button>
    <button class="nav-item" onclick="showSettings()">
      <span class="nav-icon">⚙️</span>
      <span class="nav-text">Settings</span>
    </button>
  </nav>

  <script src="./app.js"></script>
</body>
</html>
