<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Life Timer - Count your remaining time">
  <meta name="theme-color" content="#1a1d29">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Life Timer">
  
  <title>Life Timer ⏳</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #1a1d29;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      width: 100%;
      max-width: 650px;
      padding: 20px;
    }
    
    /* Setup Screen */
    .setup {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    
    .setup h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: 700;
      color: #ffffff;
    }
    
    .setup p {
      color: #9ca3af;
      margin-bottom: 40px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #ffffff;
      font-weight: 500;
    }
    
    .label-help {
      display: block;
      margin-top: 5px;
      font-size: 0.8rem;
      color: #6b7280;
      font-weight: 400;
    }
    
    input[type="date"],
    select {
      width: 100%;
      padding: 16px 18px;
      background: #252836;
      border: 1px solid #2d303e;
      border-radius: 12px;
      color: #ffffff;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    input[type="date"]:focus,
    select:focus {
      outline: none;
      border-color: #4a5568;
      background: #2a2d3a;
    }
    
    input[type="number"] {
      width: 100%;
      padding: 16px 18px;
      background: #252836;
      border: 1px solid #2d303e;
      border-radius: 12px;
      color: #ffffff;
      font-family: inherit;
      font-size: 1rem;
    }
    
    select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 18px center;
      padding-right: 45px;
    }
    
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(255, 82, 82, 0.3);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.secondary {
      background: transparent;
      color: #ffffff;
      border: 2px solid #2d303e;
      margin-top: 12px;
      box-shadow: none;
    }
    
    button.secondary:hover {
      background: #252836;
      border-color: #4a5568;
      box-shadow: none;
    }
    
    /* Timer Screen */
    .timer {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    
    /* More Rectangular Clock Display - Red Theme with Dimmer Glow */
    .clock-display {
      background: #000000;
      border: 3px solid #ff6b6b;
      border-radius: 20px;
      padding: 35px 50px;
      margin-bottom: 20px;
      box-shadow: 
        0 0 15px rgba(255, 107, 107, 0.25),
        0 0 30px rgba(255, 107, 107, 0.15),
        inset 0 0 10px rgba(255, 107, 107, 0.03);
      position: relative;
      overflow: visible;
    }
    
    .clock-time {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #ff6b6b;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
      text-shadow: 
        0 0 5px rgba(255, 107, 107, 0.4),
        0 0 10px rgba(255, 107, 107, 0.3),
        0 0 15px rgba(255, 107, 107, 0.2),
        0 0 20px rgba(255, 107, 107, 0.1);
      position: relative;
      z-index: 1;
      font-family: 'Courier New', monospace;
      line-height: 1.1;
    }
    
    .clock-label {
      font-size: 0.75rem;
      color: #ff8a8a;
      letter-spacing: 4px;
      font-weight: 600;
      position: relative;
      z-index: 1;
      text-shadow: 0 0 5px rgba(255, 107, 107, 0.2);
      margin-bottom: 6px;
    }
    
    .timer-title {
      color: #9ca3af;
      margin-top: 12px;
      font-size: 1.05rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    
    /* End Date Display */
    .end-date-display {
      background: linear-gradient(145deg, #1f212e, #1a1c28);
      border: 2px solid #2d303e;
      border-radius: 16px;
      padding: 20px 30px;
      margin-bottom: 28px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .end-date-display:hover {
      border-color: #ff6b6b;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.15);
    }
    
    .end-date-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .end-date-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(255, 107, 107, 0.2);
    }
    
    .end-date-time {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-top: 6px;
      font-weight: 500;
    }
    
    /* Progress Bar */
    .progress-section {
      margin: 28px 0;
    }
    
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #1f212e;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff8a8a);
      transition: width 0.5s ease;
      border-radius: 10px;
      box-shadow: 
        0 0 10px rgba(255, 107, 107, 0.5),
        0 0 20px rgba(255, 107, 107, 0.3);
    }
    
    .progress-text {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #9ca3af;
      font-weight: 500;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 28px 0;
    }
    
    .stat-card {
      background: linear-gradient(145deg, #1f212e, #1a1c28);
      border: 1px solid #2d303e;
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      background: linear-gradient(145deg, #252836, #1f212e);
      border-color: #ff6b6b;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
      transform: translateY(-2px);
    }
    
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(255, 107, 107, 0.2);
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    /* Settings Button */
    button.settings-btn {
      background: transparent;
      border: 2px solid #2d303e;
      color: #9ca3af;
      margin-top: 16px;
    }
    
    button.settings-btn:hover {
      border-color: #ff6b6b;
      color: #ffffff;
      background: rgba(255, 107, 107, 0.1);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
    }
    
    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hidden {
      display: none;
    }
    
    /* Responsive */
    @media (max-width: 500px) {
      .container {
        max-width: 100%;
        padding: 12px;
      }
      
      .clock-display {
        padding: 25px 20px;
        border-radius: 16px;
      }
      
      .clock-time {
        font-size: 2rem;
        letter-spacing: 1px;
        word-spacing: -2px;
      }
      
      .clock-label {
        font-size: 0.55rem;
        letter-spacing: 1.5px;
      }
      
      .timer-title {
        font-size: 0.9rem;
      }
      
      .end-date-display {
        padding: 16px 20px;
      }
      
      .end-date-value {
        font-size: 1.2rem;
      }
      
      .end-date-time {
        font-size: 0.8rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .stat-card:last-child {
        grid-column: 1 / -1;
      }
      
      .stat-value {
        font-size: 1.5rem;
      }
      
      .setup h1 {
        font-size: 1.8rem;
      }
    }
    
    /* Extra small phones */
    @media (max-width: 360px) {
      .clock-time {
        font-size: 1.7rem;
        letter-spacing: 0px;
      }
      
      .clock-display {
        padding: 20px 15px;
      }
      
      .end-date-value {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Setup Screen -->
    <div id="setupScreen" class="setup hidden">
      <h1>⏳ Life Timer Setup</h1>
      <p>Set your birthdate once. Saved permanently on this device.</p>
      
      <div class="form-group">
        <label for="birthdate">Your birthdate</label>
        <input type="date" id="birthdate" max="">
      </div>
      
      <div class="form-group">
        <label for="country">Life expectancy</label>
        <select id="country">
          <option value="73.4">Global Average (~73.4 years)</option>
          <option value="70.8">India (~70.8 years)</option>
          <option value="78.9">USA (~78.9 years)</option>
          <option value="84.0">Japan (~84.0 years)</option>
          <option value="84.3">Singapore (~84.3 years)</option>
          <option value="81.3">UK (~81.3 years)</option>
          <option value="76.0">Brazil (~76.0 years)</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="timezone">
          Timezone for day counter
          <span class="label-help">When should the day counter reset?</span>
        </label>
        <select id="timezone">
          <option value="5.5">Indian Standard Time (IST - UTC+5:30)</option>
          <option value="0">Universal Time (UTC+0)</option>
          <option value="-5">US Eastern Time (EST - UTC-5)</option>
          <option value="-6">US Central Time (CST - UTC-6)</option>
          <option value="-7">US Mountain Time (MST - UTC-7)</option>
          <option value="-8">US Pacific Time (PST - UTC-8)</option>
          <option value="1">Central Europe (CET - UTC+1)</option>
          <option value="2">Eastern Europe (EET - UTC+2)</option>
          <option value="3">Moscow (MSK - UTC+3)</option>
          <option value="4">Gulf Standard (GST - UTC+4)</option>
          <option value="5">Pakistan Time (PKT - UTC+5)</option>
          <option value="6">Bangladesh Time (BST - UTC+6)</option>
          <option value="7">Indochina Time (ICT - UTC+7)</option>
          <option value="8">China Standard (CST - UTC+8)</option>
          <option value="9">Japan Standard (JST - UTC+9)</option>
          <option value="10">Australian Eastern (AEST - UTC+10)</option>
          <option value="12">New Zealand (NZST - UTC+12)</option>
        </select>
      </div>
      
      <div class="form-group hidden" id="customExpectancy">
        <label for="customYears">Custom Years</label>
        <input type="number" id="customYears" min="50" max="100" step="0.1" value="73.4">
      </div>
      
      <button onclick="saveSettings()">🕐 Start Clock</button>
    </div>
    
    <!-- Timer Screen -->
    <div id="timerScreen" class="timer hidden">
      <div class="clock-display">
        <div class="clock-time" id="clockTime">00:000:00:00:00</div>
        <div class="clock-label">YEARS : DAYS : HOURS : MIN : SEC</div>
        <div class="timer-title">⏳ Time Remaining</div>
      </div>
      
      <!-- End Date Display -->
      <div class="end-date-display">
        <div class="end-date-label">📅 Calculated End Date</div>
        <div class="end-date-value" id="endDateValue">Loading...</div>
        <div class="end-date-time" id="endDateTime">00:00:00</div>
      </div>
      
      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">Life Lived: 0.00%</div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="currentAge">0</div>
          <div class="stat-label">Current Age</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="daysLeft">0</div>
          <div class="stat-label">Days Left</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="hoursLeft">0</div>
          <div class="stat-label">Hours Left</div>
        </div>
      </div>
      
      <button class="settings-btn" onclick="showSettings()">⚙️ Settings</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY_BD = 'lifeTimer_birthdate';
    const STORAGE_KEY_LE = 'lifeTimer_lifeExpectancy';
    const STORAGE_KEY_TZ = 'lifeTimer_timezone';
    
    let timerInterval;
    let currentTimezoneOffset = 5.5;
    
    function init() {
      document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];
      
      const savedBD = localStorage.getItem(STORAGE_KEY_BD);
      const savedLE = localStorage.getItem(STORAGE_KEY_LE);
      const savedTZ = localStorage.getItem(STORAGE_KEY_TZ) || '5.5';
      
      if (savedBD && savedLE) {
        startTimer(savedBD, parseFloat(savedLE), parseFloat(savedTZ));
      } else {
        showSetup();
      }
      
      document.getElementById('country').addEventListener('change', function() {
        const customDiv = document.getElementById('customExpectancy');
        if (this.value === 'custom') {
          customDiv.classList.remove('hidden');
        } else {
          customDiv.classList.add('hidden');
        }
      });
    }
    
    function showSetup() {
      document.getElementById('setupScreen').classList.remove('hidden');
      document.getElementById('timerScreen').classList.add('hidden');
      if (timerInterval) clearInterval(timerInterval);
    }
    
    function showSettings() {
      const savedBD = localStorage.getItem(STORAGE_KEY_BD);
      const savedLE = localStorage.getItem(STORAGE_KEY_LE);
      const savedTZ = localStorage.getItem(STORAGE_KEY_TZ) || '5.5';
      
      if (savedBD) {
        document.getElementById('birthdate').value = savedBD;
      }
      
      if (savedTZ) {
        document.getElementById('timezone').value = savedTZ;
      }
      
      const countrySelect = document.getElementById('country');
      const matchingOption = Array.from(countrySelect.options).find(opt => opt.value === savedLE);
      
      if (matchingOption) {
        countrySelect.value = savedLE;
      } else {
        countrySelect.value = 'custom';
        document.getElementById('customExpectancy').classList.remove('hidden');
        document.getElementById('customYears').value = savedLE;
      }
      
      showSetup();
    }
    
    function saveSettings() {
      const birthdate = document.getElementById('birthdate').value;
      if (!birthdate) {
        alert('Please select your birthdate');
        return;
      }
      
      let lifeExpectancy;
      const countryValue = document.getElementById('country').value;
      
      if (countryValue === 'custom') {
        lifeExpectancy = parseFloat(document.getElementById('customYears').value);
      } else {
        lifeExpectancy = parseFloat(countryValue);
      }
      
      const timezone = parseFloat(document.getElementById('timezone').value);
      
      localStorage.setItem(STORAGE_KEY_BD, birthdate);
      localStorage.setItem(STORAGE_KEY_LE, lifeExpectancy.toString());
      localStorage.setItem(STORAGE_KEY_TZ, timezone.toString());
      
      startTimer(birthdate, lifeExpectancy, timezone);
    }
    
    function getCurrentTimeInTimezone(tzOffsetHours) {
      const now = new Date();
      const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
      return utcTime + (tzOffsetHours * 3600000);
    }
    
    function getMidnightInTimezone(year, month, day, tzOffsetHours) {
      const midnightUTC = Date.UTC(year, month, day, 0, 0, 0, 0);
      return midnightUTC - (tzOffsetHours * 3600000);
    }
    
    function getMidnightTodayInTimezone(tzOffsetHours) {
      const nowInTz = getCurrentTimeInTimezone(tzOffsetHours);
      const dateInTz = new Date(nowInTz);
      
      const year = dateInTz.getUTCFullYear();
      const month = dateInTz.getUTCMonth();
      const day = dateInTz.getUTCDate();
      
      return getMidnightInTimezone(year, month, day, tzOffsetHours);
    }
    
    function getNextMidnightInTimezone(tzOffsetHours) {
      const midnightToday = getMidnightTodayInTimezone(tzOffsetHours);
      const now = new Date().getTime();
      
      if (now >= midnightToday) {
        return midnightToday + (24 * 3600000);
      } else {
        return midnightToday;
      }
    }
    
    function formatDateInTimezone(timestamp, tzOffsetHours) {
      const dateInTz = new Date(timestamp + (tzOffsetHours * 3600000));
      
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                      'July', 'August', 'September', 'October', 'November', 'December'];
      
      const year = dateInTz.getUTCFullYear();
      const month = months[dateInTz.getUTCMonth()];
      const day = dateInTz.getUTCDate();
      
      const suffix = (day) => {
        if (day > 3 && day < 21) return 'th';
        switch (day % 10) {
          case 1: return 'st';
          case 2: return 'nd';
          case 3: return 'rd';
          default: return 'th';
        }
      };
      
      return `${month} ${day}${suffix(day)}, ${year}`;
    }
    
    function startTimer(birthdate, lifeExpectancy, tzOffsetHours) {
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('timerScreen').classList.remove('hidden');
      
      currentTimezoneOffset = tzOffsetHours;
      
      const [year, month, day] = birthdate.split('-');
      const birthDate = new Date(getMidnightInTimezone(parseInt(year), parseInt(month) - 1, parseInt(day), tzOffsetHours));
      
      const totalDaysInLife = Math.round(lifeExpectancy * 365.25);
      
      function updateTimer() {
        const now = new Date();
        
        // Calculate days remaining based on midnights in selected timezone
        const midnightToday = getMidnightTodayInTimezone(currentTimezoneOffset);
        const daysSinceBirth = Math.floor((midnightToday - birthDate.getTime()) / (24 * 3600000));
        const daysRemaining = totalDaysInLife - daysSinceBirth;
        
        // Calculate the END DATE based on daysRemaining from today's midnight
        // This ensures the timer and end date always match
        const endOfLifeTimestamp = midnightToday + (daysRemaining * 24 * 3600000);
        const endOfLife = new Date(endOfLifeTimestamp);
        
        const lived = now - birthDate;
        const remaining = endOfLife - now;
        
        if (remaining <= 0) {
          document.getElementById('clockTime').textContent = '00:000:00:00:00';
          document.getElementById('progressFill').style.width = '100%';
          document.getElementById('progressText').textContent = 'Life Lived: 100.00%';
          document.getElementById('endDateTime').textContent = '00:00:00';
          clearInterval(timerInterval);
          return;
        }
        
        // Display the end date (dynamically updated to match timer)
        const endDateFormatted = formatDateInTimezone(endOfLife.getTime(), currentTimezoneOffset);
        document.getElementById('endDateValue').textContent = endDateFormatted;
        document.getElementById('endDateTime').textContent = '00:00:00';
        
        // Calculate time until next midnight
        const nextMidnight = getNextMidnightInTimezone(currentTimezoneOffset);
        const timeUntilMidnight = nextMidnight - now.getTime();
        
        const hoursUntilMidnight = Math.floor(timeUntilMidnight / 3600000);
        const minutesUntilMidnight = Math.floor((timeUntilMidnight % 3600000) / 60000);
        const secondsUntilMidnight = Math.floor((timeUntilMidnight % 60000) / 1000);
        
        const years = Math.floor(daysRemaining / 365);
        const days = daysRemaining % 365;
        
        const timeString = `${String(years).padStart(2, '0')}:${String(days).padStart(3, '0')}:${String(hoursUntilMidnight).padStart(2, '0')}:${String(minutesUntilMidnight).padStart(2, '0')}:${String(secondsUntilMidnight).padStart(2, '0')}`;
        document.getElementById('clockTime').textContent = timeString;
        
        const totalLife = endOfLife - birthDate;
        const livedPercent = (lived / totalLife) * 100;
        document.getElementById('progressFill').style.width = livedPercent.toFixed(2) + '%';
        document.getElementById('progressText').textContent = `Life Lived: ${livedPercent.toFixed(2)}%`;
        
        const currentAge = Math.floor((now - birthDate) / (365.25 * 24 * 60 * 60 * 1000));
        document.getElementById('currentAge').textContent = currentAge;
        document.getElementById('daysLeft').textContent = daysRemaining.toLocaleString();
        document.getElementById('hoursLeft').textContent = (daysRemaining * 24 + hoursUntilMidnight).toLocaleString();
      }
      
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
    }
    
    init();
  </script>
</body>
</html>
